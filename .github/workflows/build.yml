name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Node.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools/node | Out-Null
          Invoke-WebRequest https://nodejs.org/dist/v22.2.0/win-x64/node.exe -OutFile tools/node/node.exe

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile `
            --name D2RMarketplace `
            --icon=icon.ico `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "data;data" `
            --add-data "database;database" `
            --add-data "tools;tools" `
            --add-data "config.json;." `
            desktop_launcher.py

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item dist/D2RMarketplace.exe D2RMarketplace-windows.exe

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist/D2RMarketplace-windows.exe -DestinationPath D2RMarketplace-windows.zip -Force

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: D2RMarketplace-windows
          path: D2RMarketplace-windows.zip

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: D2RMarketplace-windows.zip
