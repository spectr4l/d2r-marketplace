<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2R Market</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/core.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 class="brand-title">D2R Market</h1>
          <p class="brand-subtitle">Single Player Auction House</p>
        </div>

        <nav class="main-nav" aria-label="Navegação principal">
          <ul class="nav-list">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('inventory') }}">Inventory</a></li>
            <li><a href="{{ url_for('catalog') }}">Market</a></li>
            <li><a href="{{ url_for('stash') }}">Listings</a></li>
            <li><a href="{{ url_for('config') }}">Configurations</a></li>
          </ul>
        </nav>

        <div class="topbar-actions">
          <a href="{{ url_for('support') }}" class="support-link">☕ Support the project</a>

          <div class="token-panel panel">
            <span class="token-label">Balance</span>
            <strong class="token-value" id="balance-value">{{ global_balance }}</strong>
            <span class="token-label">tokens</span>
          </div>
        </div>
    </header>

    <main class="page-content">
      <div id="message-area" class="message-area"></div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
