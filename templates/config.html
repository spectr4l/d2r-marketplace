{% extends "base.html" %}

{% block content %}
<div style="padding: 20px;">
    <h2 style="color: #e94560; margin-bottom: 20px;">Configurações</h2>

    <div style="background: #16213e; padding: 20px; border-radius: 8px; max-width: 600px;">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #4ecdc4; font-weight: bold;">
                Pasta de Saves do D2R:
            </label>

            <input
                type="text"
                id="save_folder"
                value="{{ save_folder }}"
                style="width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #0f3460; color: white; border-radius: 5px; margin-bottom: 10px;"
            >

            <button
                onclick="updateSaveFolder()"
                style="padding: 10px 20px;">
                Atualizar Pasta
            </button>
        </div>

        <div style="border-top: 1px solid #0f3460; padding-top: 20px;">
            <p style="color: #ccc;">Status do Banco de Dados: <span style="color: #4ecdc4;">Ativo</span></p>
            <p style="color: #ccc;">Versão: 1.0.0</p>
        </div>
    </div>
</div>
{% endblock %}
